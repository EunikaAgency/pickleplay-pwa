<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="256x256" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      Apply the saved theme before first paint to avoid a flash of the wrong
      theme on load. Must mirror useTheme.ts (readStoredTheme + applyTheme):
      same 'pickleballers:theme' key, same default of 'light' when unset, and
      'system' = no attribute (CSS prefers-color-scheme governs).
    -->
    <script>
      (function () {
        var t = 'light';
        try {
          var s = localStorage.getItem('pickleballers:theme');
          if (s === 'light' || s === 'dark' || s === 'system') t = s;
        } catch (e) {}
        if (t === 'system') document.documentElement.removeAttribute('data-theme');
        else document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <meta name="theme-color" content="#ffffff" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PickleBallers" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      Declared here, not left to vite-plugin-pwa's build-time injection: prod
      serves the Vite DEV server (see ecosystem.config.cjs), and in dev the
      plugin serves /manifest.webmanifest but never injects this tag — so
      without it the live site had no manifest at all and was not installable.
      The plugin reuses this tag on build instead of adding a second one.
    -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="description" content="Find pickleball games near you, meet players at your skill level, and turn your local courts into a community." />
    <meta property="og:title" content="PickleBallers — Find games. Meet players. Play pickleball." />
    <meta property="og:description" content="The easiest way to find a pickleball game near you, meet players at your skill level, and turn your local courts into a community." />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800;6..12,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Grandstander:wght@500;600;700;800;900&family=Lexend:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL@24,400,0&display=swap" rel="stylesheet" />
    <title>PickleBallers — Find games. Meet players. Play pickleball.</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
