<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>PickleBallers — Launch</title>
<style>
  :root{
    --lime:#C8F12C;
    --lime-light:#E4FA8E;
    --lime-deep:#9FCB12;
    --blue:#3557FF;
    --blue-light:#7188FF;
    --blue-deep:#2541CC;
    --bg:#F5F6FB;
    --bg-deep:#E8EAF6;
    --ink:#20243A;
    --ink-soft:#565C7A;
    --white:#FFFFFF;

    --ease-out: cubic-bezier(0,0,0.2,1);
    --ease-in-out: cubic-bezier(0.4,0,0.2,1);
    --ease-spring: cubic-bezier(0.34,1.56,0.64,1);
    --ease-soft-spring: cubic-bezier(0.22,1.2,0.36,1);

    --font-display: 'SF Pro Rounded','Segoe UI Rounded',-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;
    --font-body: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; height:100%;
    background:#11132066;
    font-family:var(--font-body);
    overscroll-behavior:none;
  }

  /* ---------- Desktop preview backdrop ---------- */
  .stage-backdrop{
    min-height:100dvh;
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(circle at 18% 14%, #2a3270 0%, transparent 55%),
      radial-gradient(circle at 84% 86%, #1a1f47 0%, transparent 55%),
      linear-gradient(160deg,#14172e,#1b1f3d 60%,#11132a);
    padding:28px 0;
  }

  .phone{
    position:relative;
    width:390px;
    height:844px;
    max-width:100vw;
    max-height:100dvh;
    background:var(--bg);
    overflow:hidden;
    isolation:isolate;
    box-shadow:0 40px 90px -20px rgba(8,9,30,0.65), 0 0 0 10px #0c0e1f;
    border-radius:46px;
  }

  @media (max-width:480px){
    .stage-backdrop{ padding:0; background:var(--bg); }
    .phone{
      width:100vw; height:100dvh; border-radius:0;
      box-shadow:none; box-shadow:0 0 0 0 transparent;
    }
  }

  /* ---------- Ambient backdrop blobs (glassmorphism accent) ---------- */
  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(46px);
    opacity:0;
    z-index:0;
    transition:opacity 1.2s var(--ease-out);
    will-change:transform;
  }
  .blob-lime{
    width:260px; height:260px;
    top:-90px; left:-80px;
    background:radial-gradient(circle, var(--lime) 0%, transparent 70%);
    animation:driftA 13s ease-in-out infinite;
  }
  .blob-blue{
    width:300px; height:300px;
    bottom:-110px; right:-100px;
    background:radial-gradient(circle, var(--blue) 0%, transparent 70%);
    animation:driftB 16s ease-in-out infinite;
  }
  .phone.loaded .blob{ opacity:.30; }

  @keyframes driftA{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(24px,18px) scale(1.08); }
  }
  @keyframes driftB{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-20px,-16px) scale(1.06); }
  }

  /* ---------- Ambient particles ---------- */
  .particle-field{
    position:absolute; inset:0;
    z-index:1;
    overflow:hidden;
    pointer-events:none;
  }
  .mote{
    position:absolute;
    bottom:-20px;
    border-radius:50%;
    opacity:0;
    filter:blur(.3px);
    animation-name:floatUp;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    8%{ opacity:.55; }
    50%{ transform:translateY(-420px) translateX(14px); }
    92%{ opacity:.3; }
    100%{ transform:translateY(-680px) translateX(-6px); opacity:0; }
  }

  /* ---------- Court lines (background reveal) ---------- */
  .court-lines{
    position:absolute;
    inset:0;
    width:100%; height:100%;
    z-index:2;
    opacity:0;
    transform:scale(1.04);
    transition:opacity 1.1s var(--ease-out), transform 1.4s var(--ease-out);
  }
  .phone.bg-reveal .court-lines{ opacity:1; transform:scale(1); }

  /* ---------- Pins ---------- */
  .pin{
    position:absolute;
    z-index:3;
    width:30px; height:30px;
    opacity:0;
    transform:translateY(10px) scale(.4);
    transition:opacity .5s var(--ease-spring), transform .55s var(--ease-spring);
  }
  .pin1{ top:21%; left:12%; transition-delay:.05s; }
  .pin2{ top:7%; right:36%; transition-delay:.22s; }
  .pin3{ bottom:30%; left:9%; transition-delay:.38s; }
  .phone.bg-reveal .pin{ opacity:1; transform:translateY(0) scale(1); }

  /* ---------- Floating info badges ---------- */
  .badge{
    position:absolute;
    z-index:4;
    display:flex;
    align-items:center;
    gap:6px;
    padding:8px 13px;
    border-radius:999px;
    background:rgba(255,255,255,0.62);
    backdrop-filter:blur(10px) saturate(160%);
    -webkit-backdrop-filter:blur(10px) saturate(160%);
    border:1px solid rgba(255,255,255,0.7);
    box-shadow:0 8px 22px -8px rgba(32,36,58,0.25);
    font-size:11.5px;
    font-weight:600;
    color:var(--ink);
    white-space:nowrap;
    opacity:0;
    transform:translateY(16px) scale(.85);
    transition:opacity .6s var(--ease-out), transform .65s var(--ease-soft-spring);
  }
  .badge .dot{
    width:7px; height:7px; border-radius:50%; flex:none;
  }
  .badge-1{ top:18%; right:-6px; transition-delay:.05s; }
  .badge-1 .dot{ background:var(--lime-deep); box-shadow:0 0 0 3px rgba(159,203,18,0.25); }
  .badge-2{ top:38%; left:-10px; transition-delay:.20s; }
  .badge-2 .dot{ background:var(--blue); box-shadow:0 0 0 3px rgba(53,87,255,0.22); }
  .badge-3{ bottom:23%; right:-8px; transition-delay:.35s; }
  .badge-3 .dot{ background:#FF8A3D; box-shadow:0 0 0 3px rgba(255,138,61,0.22); }

  .phone.bg-reveal .badge{ opacity:1; transform:translateY(0) scale(1); }
  .phone.bg-reveal .badge-1{ animation:bob1 4.2s ease-in-out 1.1s infinite; }
  .phone.bg-reveal .badge-2{ animation:bob2 4.8s ease-in-out 1.3s infinite; }
  .phone.bg-reveal .badge-3{ animation:bob3 4.5s ease-in-out 1.5s infinite; }
  @keyframes bob1{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-8px) scale(1); } }
  @keyframes bob2{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(7px) scale(1); } }
  @keyframes bob3{ 0%,100%{ transform:translateY(0) scale(1); } 50%{ transform:translateY(-9px) scale(1); } }

  /* ---------- Hero stage ---------- */
  .hero-stage{
    position:absolute;
    left:0; right:0;
    top:0;
    height:100%;
    z-index:6;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .ball-rig{
    position:relative;
    width:120px;
    height:120px;
    transform:translateY(-78px);
  }

  .trail{
    position:absolute;
    left:50%; top:50%;
    width:18px; height:90px;
    background:linear-gradient(to top, rgba(200,241,44,0) 0%, rgba(200,241,44,.55) 60%, rgba(200,241,44,0) 100%);
    border-radius:50%;
    transform:translate(-50%,-20%) scaleY(0);
    transform-origin:bottom center;
    opacity:0;
    filter:blur(3px);
    z-index:5;
  }
  .trail.show{
    animation:trailStreak .55s var(--ease-out) forwards;
  }
  @keyframes trailStreak{
    0%{ opacity:0; transform:translate(-50%,10%) scaleY(.2); }
    25%{ opacity:.9; }
    100%{ opacity:0; transform:translate(-50%,-90%) scaleY(1.5); }
  }

  .pickleball{
    position:absolute;
    left:50%; top:50%;
    width:84px; height:84px;
    margin:-42px 0 0 -42px;
    opacity:0;
    transform:scale(.2);
    filter:drop-shadow(0 10px 16px rgba(32,36,58,0.22));
    z-index:7;
  }
  .pickleball.show{
    animation:ballIn .62s var(--ease-spring) forwards;
  }
  @keyframes ballIn{
    0%{ opacity:0; transform:scale(.2) translateY(-30px); }
    55%{ opacity:1; transform:scale(1.08) translateY(4px); }
    75%{ transform:scale(.94) translateY(-3px); }
    100%{ opacity:1; transform:scale(1) translateY(0); }
  }
  .pickleball.hit{
    animation:ballSquash .16s var(--ease-out) forwards;
  }
  @keyframes ballSquash{
    0%{ transform:scale(1,1); }
    50%{ transform:scale(1.18,.78) translateX(-6px); }
    100%{ transform:scale(1,1); }
  }
  .pickleball.launch{
    animation:ballLaunch .42s var(--ease-out) forwards;
  }
  @keyframes ballLaunch{
    0%{ opacity:1; transform:scale(1) translate(0,0) rotate(0deg); }
    100%{ opacity:1; transform:scale(.92) translate(-4px,-150px) rotate(-200deg); }
  }
  .pickleball.fade-out{
    animation:ballFade .32s var(--ease-in-out) forwards;
  }
  @keyframes ballFade{
    0%{ opacity:1; transform:scale(.78) translate(-4px,-150px) rotate(-220deg); }
    100%{ opacity:0; transform:scale(.35) translate(0,-150px) rotate(-260deg); }
  }

  .paddle{
    position:absolute;
    left:50%; top:50%;
    width:74px; height:128px;
    margin:-100px 0 0 4px;
    opacity:0;
    transform-origin:50% 88%;
    transform:translate(190px,40px) rotate(58deg);
    filter:drop-shadow(0 12px 14px rgba(32,36,58,0.25));
    z-index:8;
  }
  .paddle.swing-in{
    animation:paddleIn .3s var(--ease-out) forwards;
  }
  @keyframes paddleIn{
    0%{ opacity:0; transform:translate(190px,40px) rotate(58deg); }
    30%{ opacity:1; }
    100%{ opacity:1; transform:translate(8px,-2px) rotate(-8deg); }
  }
  .paddle.hit{
    animation:paddleRecoil .16s var(--ease-out) forwards;
  }
  @keyframes paddleRecoil{
    0%{ transform:translate(8px,-2px) rotate(-8deg); }
    50%{ transform:translate(2px,-8px) rotate(-22deg); }
    100%{ transform:translate(8px,-2px) rotate(-8deg); }
  }
  .paddle.swing-out{
    animation:paddleOut .34s var(--ease-in-out) forwards;
  }
  @keyframes paddleOut{
    0%{ opacity:1; transform:translate(8px,-2px) rotate(-8deg); }
    100%{ opacity:0; transform:translate(-40px,-60px) rotate(-46deg); }
  }

  /* ---------- Impact effects ---------- */
  .impact-burst{
    position:absolute;
    left:50%; top:50%;
    width:1px; height:1px;
    z-index:9;
  }
  .ripple{
    position:absolute;
    left:0; top:0;
    width:60px; height:60px;
    margin:-30px 0 0 -30px;
    border-radius:50%;
    border:3px solid var(--lime);
    opacity:0;
  }
  .impact-burst.go .ripple{
    animation:rippleGo .55s var(--ease-out) forwards;
  }
  @keyframes rippleGo{
    0%{ opacity:.9; transform:scale(.3); }
    100%{ opacity:0; transform:scale(3.4); }
  }
  .spark{
    position:absolute;
    left:0; top:0;
    width:7px; height:7px;
    margin:-3.5px 0 0 -3.5px;
    border-radius:50%;
    opacity:0;
  }
  .impact-burst.go .spark{
    animation-name:sparkFly;
    animation-duration:.5s;
    animation-timing-function:var(--ease-out);
    animation-fill-mode:forwards;
  }
  @keyframes sparkFly{
    0%{ opacity:1; transform:translate(0,0) scale(1); }
    100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(.3); }
  }

  /* ---------- Logo ---------- */
  .logo-wrap{
    position:absolute;
    left:0; right:0;
    top:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform:translateY(calc(-50% + 2px)) scale(.7);
    opacity:0;
    z-index:10;
  }
  .logo-wrap.reveal{
    animation:logoIn .55s var(--ease-spring) forwards;
  }
  @keyframes logoIn{
    0%{ opacity:0; transform:translateY(calc(-50% + 2px)) scale(.62); }
    60%{ opacity:1; }
    100%{ opacity:1; transform:translateY(calc(-50% + 2px)) scale(1); }
  }

  .logo-mark{
    width:46px; height:46px;
    margin-bottom:10px;
  }

  .logo-text{
    margin:0;
    font-family:var(--font-display);
    font-weight:800;
    font-size:34px;
    line-height:1;
    letter-spacing:-0.5px;
    display:flex;
  }
  .word{ display:inline-flex; }
  .word-pickle{ color:var(--blue); }
  .word-ballers{ color:var(--lime-deep); }
  .letter{
    display:inline-block;
    opacity:0;
    transform:translateY(16px) scale(.7);
    animation-name:letterPop;
    animation-duration:.46s;
    animation-timing-function:var(--ease-spring);
    animation-fill-mode:forwards;
  }
  @keyframes letterPop{
    0%{ opacity:0; transform:translateY(16px) scale(.7); }
    65%{ opacity:1; }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }

  /* ---------- Footer: tagline + CTA ---------- */
  .footer-stack{
    position:absolute;
    left:0; right:0;
    bottom:9%;
    z-index:11;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 32px;
  }

  .tagline{
    margin:0 0 22px;
    font-family:var(--font-body);
    font-size:14.5px;
    font-weight:500;
    color:var(--ink-soft);
    text-align:center;
    letter-spacing:.1px;
    opacity:0;
    transform:translateY(14px);
  }
  .footer-stack.reveal .tagline{
    animation:fadeUp .5s var(--ease-out) forwards;
  }

  @keyframes fadeUp{
    to{ opacity:1; transform:translateY(0); }
  }

  .cta-btn{
    position:relative;
    border:none;
    cursor:pointer;
    padding:15px 46px;
    border-radius:999px;
    background:linear-gradient(180deg, var(--lime-light), var(--lime) 60%, var(--lime-deep));
    color:var(--ink);
    font-family:var(--font-display);
    font-weight:800;
    font-size:16.5px;
    letter-spacing:.2px;
    box-shadow:0 10px 24px -8px rgba(159,203,18,0.55), 0 2px 0 rgba(0,0,0,0.06) inset;
    opacity:0;
    transform:translateY(18px) scale(.85);
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .footer-stack.reveal .cta-btn{
    animation:btnIn .5s var(--ease-spring) forwards;
    animation-delay:.18s;
  }
  @keyframes btnIn{
    0%{ opacity:0; transform:translateY(18px) scale(.8); }
    65%{ opacity:1; }
    100%{ opacity:1; transform:translateY(0) scale(1); }
  }
  .cta-btn.pulse{
    animation:btnPulse 2.1s ease-in-out infinite;
  }
  @keyframes btnPulse{
    0%,100%{ box-shadow:0 10px 24px -8px rgba(159,203,18,0.55), 0 0 0 0 rgba(200,241,44,0.45); }
    50%{ box-shadow:0 12px 30px -6px rgba(159,203,18,0.7), 0 0 0 10px rgba(200,241,44,0); }
  }
  .cta-btn:active{ transform:scale(.96); }

  .cta-btn .ripple-tap{
    position:absolute;
    border-radius:50%;
    background:rgba(32,36,58,0.18);
    transform:scale(0);
    animation:tapRipple .55s var(--ease-out) forwards;
    pointer-events:none;
  }
  @keyframes tapRipple{ to{ transform:scale(1); opacity:0; } }

  /* ---------- Navigate-away overlay ---------- */
  .go-overlay{
    position:absolute;
    inset:0;
    z-index:50;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:18px;
    background:var(--lime);
    clip-path:circle(0% at var(--ox,50%) var(--oy,90%));
    pointer-events:none;
  }
  .go-overlay.run{
    animation:wipeIn .85s var(--ease-in-out) forwards;
  }
  @keyframes wipeIn{
    to{ clip-path:circle(150% at var(--ox,50%) var(--oy,90%)); }
  }
  .go-overlay h2{
    margin:0;
    font-family:var(--font-display);
    font-weight:800;
    font-size:24px;
    color:var(--ink);
    opacity:0;
  }
  .go-overlay p{
    margin:0;
    font-family:var(--font-body);
    font-size:13.5px;
    font-weight:600;
    color:var(--ink);
    opacity:.75;
  }
  .go-overlay.run h2{
    animation:fadeUp .5s var(--ease-out) forwards;
    animation-delay:.4s;
  }
  .replay-btn{
    margin-top:10px;
    border:none;
    background:var(--ink);
    color:var(--lime);
    font-family:var(--font-body);
    font-weight:700;
    font-size:12.5px;
    padding:9px 18px;
    border-radius:999px;
    opacity:0;
    cursor:pointer;
  }
  .go-overlay.run .replay-btn{
    animation:fadeUp .5s var(--ease-out) forwards;
    animation-delay:.65s;
    pointer-events:auto;
  }

  .home-indicator{
    position:absolute;
    bottom:9px; left:50%;
    transform:translateX(-50%);
    width:134px; height:5px;
    border-radius:999px;
    background:var(--ink);
    opacity:.18;
    z-index:60;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important; }
  }
</style>
</head>
<body>

<div class="stage-backdrop">
  <div class="phone" id="phone">

    <div class="blob blob-lime"></div>
    <div class="blob blob-blue"></div>

    <div class="particle-field" id="particleField"></div>

    <svg class="court-lines" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
      <g fill="none" stroke="#3557FF" stroke-width="2" opacity="0.16">
        <rect x="40" y="120" width="310" height="600" rx="6"></rect>
        <line x1="40" y1="420" x2="350" y2="420"></line>
        <line x1="195" y1="120" x2="195" y2="300"></line>
        <line x1="195" y1="540" x2="195" y2="720"></line>
        <line x1="40" y1="300" x2="350" y2="300"></line>
        <line x1="40" y1="540" x2="350" y2="540"></line>
      </g>
    </svg>

    <svg class="pin pin1" viewBox="0 0 24 24" fill="none">
      <path d="M12 22s7-7.58 7-13a7 7 0 1 0-14 0c0 5.42 7 13 7 13Z" fill="#3557FF"/>
      <circle cx="12" cy="9" r="2.6" fill="#fff"/>
    </svg>
    <svg class="pin pin2" viewBox="0 0 24 24" fill="none">
      <path d="M12 22s7-7.58 7-13a7 7 0 1 0-14 0c0 5.42 7 13 7 13Z" fill="#C8F12C"/>
      <circle cx="12" cy="9" r="2.6" fill="#20243A"/>
    </svg>
    <svg class="pin pin3" viewBox="0 0 24 24" fill="none">
      <path d="M12 22s7-7.58 7-13a7 7 0 1 0-14 0c0 5.42 7 13 7 13Z" fill="#3557FF"/>
      <circle cx="12" cy="9" r="2.6" fill="#fff"/>
    </svg>

    <div class="badge badge-1"><span class="dot"></span>12 Games Today</div>
    <div class="badge badge-2"><span class="dot"></span>2 Spots Left</div>
    <div class="badge badge-3"><span class="dot"></span>4 Courts Nearby</div>

    <div class="hero-stage">
      <div class="ball-rig">

        <div class="trail" id="trail"></div>

        <svg class="paddle" id="paddle" viewBox="0 0 100 170">
          <defs>
            <linearGradient id="paddleGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6E86FF"/>
              <stop offset="100%" stop-color="#3557FF"/>
            </linearGradient>
          </defs>
          <rect x="8" y="4" width="84" height="108" rx="38" fill="url(#paddleGrad)" stroke="#20243A" stroke-width="3"/>
          <rect x="16" y="11" width="68" height="94" rx="32" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.28"/>
          <circle cx="50" cy="40" r="7" fill="#C8F12C" opacity="0.95"/>
          <rect x="42" y="108" width="16" height="48" rx="8" fill="#20243A"/>
          <rect x="45.5" y="116" width="9" height="3" rx="1.5" fill="#C8F12C" opacity="0.85"/>
          <rect x="45.5" y="126" width="9" height="3" rx="1.5" fill="#C8F12C" opacity="0.65"/>
          <rect x="45.5" y="136" width="9" height="3" rx="1.5" fill="#C8F12C" opacity="0.45"/>
        </svg>

        <svg class="pickleball" id="pickleball" viewBox="0 0 100 100">
          <defs>
            <radialGradient id="ballGrad" cx="35%" cy="28%" r="75%">
              <stop offset="0%" stop-color="#EEFFA0"/>
              <stop offset="55%" stop-color="#C8F12C"/>
              <stop offset="100%" stop-color="#9FCB12"/>
            </radialGradient>
          </defs>
          <circle cx="50" cy="50" r="46" fill="url(#ballGrad)" stroke="#20243A" stroke-width="2.5"/>
          <g fill="#20243A" opacity="0.45">
            <circle cx="64" cy="50" r="2.6"/><circle cx="59.9" cy="59.9" r="2.6"/>
            <circle cx="50" cy="64" r="2.6"/><circle cx="40.1" cy="59.9" r="2.6"/>
            <circle cx="36" cy="50" r="2.6"/><circle cx="40.1" cy="40.1" r="2.6"/>
            <circle cx="50" cy="36" r="2.6"/><circle cx="59.9" cy="40.1" r="2.6"/>
            <circle cx="78" cy="50" r="2.3"/><circle cx="74.2" cy="64" r="2.3"/>
            <circle cx="64" cy="74.2" r="2.3"/><circle cx="50" cy="78" r="2.3"/>
            <circle cx="36" cy="74.2" r="2.3"/><circle cx="25.8" cy="64" r="2.3"/>
            <circle cx="22" cy="50" r="2.3"/><circle cx="25.8" cy="36" r="2.3"/>
            <circle cx="36" cy="25.8" r="2.3"/><circle cx="50" cy="22" r="2.3"/>
            <circle cx="64" cy="25.8" r="2.3"/><circle cx="74.2" cy="36" r="2.3"/>
            <circle cx="90" cy="50" r="2"/><circle cx="70" cy="84.6" r="2"/>
            <circle cx="30" cy="84.6" r="2"/><circle cx="10" cy="50" r="2"/>
            <circle cx="30" cy="15.4" r="2"/><circle cx="70" cy="15.4" r="2"/>
          </g>
          <ellipse cx="36" cy="33" rx="13" ry="8" fill="#ffffff" opacity="0.35"/>
        </svg>

        <div class="impact-burst" id="impactBurst">
          <div class="ripple"></div>
        </div>

      </div>

      <div class="logo-wrap" id="logoWrap">
        <svg class="logo-mark" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="46" fill="#C8F12C" stroke="#20243A" stroke-width="3"/>
          <circle cx="36" cy="50" r="2.6" fill="#20243A" opacity=".5"/>
          <circle cx="50" cy="36" r="2.6" fill="#20243A" opacity=".5"/>
          <circle cx="64" cy="50" r="2.6" fill="#20243A" opacity=".5"/>
          <circle cx="50" cy="64" r="2.6" fill="#20243A" opacity=".5"/>
          <ellipse cx="36" cy="33" rx="12" ry="7" fill="#fff" opacity=".35"/>
        </svg>
        <h1 class="logo-text">
          <span class="word word-pickle" id="wordPickle"></span><span class="word word-ballers" id="wordBallers"></span>
        </h1>
      </div>
    </div>

    <div class="footer-stack" id="footerStack">
      <p class="tagline">Find games. Meet players. Play more.</p>
      <button class="cta-btn" id="ctaBtn">Let's Play</button>
    </div>

    <div class="go-overlay" id="goOverlay">
      <h2>You're in 🎾</h2>
      <p>Home screen would load here</p>
      <button class="replay-btn" id="replayBtn">Replay intro</button>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
(function(){
  var phone = document.getElementById('phone');
  var pickleball = document.getElementById('pickleball');
  var paddle = document.getElementById('paddle');
  var trail = document.getElementById('trail');
  var impactBurst = document.getElementById('impactBurst');
  var logoWrap = document.getElementById('logoWrap');
  var footerStack = document.getElementById('footerStack');
  var ctaBtn = document.getElementById('ctaBtn');
  var goOverlay = document.getElementById('goOverlay');
  var replayBtn = document.getElementById('replayBtn');
  var particleField = document.getElementById('particleField');
  var wordPickle = document.getElementById('wordPickle');
  var wordBallers = document.getElementById('wordBallers');

  var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var timers = [];

  function buildLetters(container, text, baseDelay, stepDelay){
    container.innerHTML = '';
    for (var i = 0; i < text.length; i++){
      var span = document.createElement('span');
      span.className = 'letter';
      span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
      span.style.animationDelay = (baseDelay + i * stepDelay) + 'ms';
      container.appendChild(span);
    }
  }

  function buildSparks(){
    impactBurst.querySelectorAll('.spark').forEach(function(s){ s.remove(); });
    var colors = ['#3557FF', '#C8F12C', '#20243A'];
    for (var i = 0; i < 10; i++){
      var ang = (Math.PI * 2 / 10) * i + Math.random() * 0.3;
      var dist = 34 + Math.random() * 22;
      var s = document.createElement('div');
      s.className = 'spark';
      s.style.background = colors[i % colors.length];
      s.style.setProperty('--tx', (Math.cos(ang) * dist).toFixed(1) + 'px');
      s.style.setProperty('--ty', (Math.sin(ang) * dist).toFixed(1) + 'px');
      s.style.animationDelay = (Math.random() * 40) + 'ms';
      impactBurst.appendChild(s);
    }
  }

  function buildParticles(){
    particleField.innerHTML = '';
    var count = 16;
    for (var i = 0; i < count; i++){
      var m = document.createElement('div');
      m.className = 'mote';
      var size = 3 + Math.random() * 4;
      var lime = Math.random() > 0.5;
      m.style.width = size + 'px';
      m.style.height = size + 'px';
      m.style.left = (Math.random() * 100) + '%';
      m.style.background = lime ? 'rgba(200,241,44,0.8)' : 'rgba(53,87,255,0.6)';
      m.style.boxShadow = lime ? '0 0 8px rgba(200,241,44,0.7)' : '0 0 8px rgba(53,87,255,0.5)';
      m.style.animationDuration = (7 + Math.random() * 6) + 's';
      m.style.animationDelay = (Math.random() * 9) + 's';
      particleField.appendChild(m);
    }
  }

  function clearTimers(){
    timers.forEach(clearTimeout);
    timers = [];
  }

  function resetVisualState(){
    [pickleball, paddle, trail, impactBurst, logoWrap, footerStack, ctaBtn].forEach(function(el){
      el.className = el.id === 'pickleball' ? 'pickleball'
        : el.id === 'paddle' ? 'paddle'
        : el.id === 'trail' ? 'trail'
        : el.id === 'impactBurst' ? 'impact-burst'
        : el.id === 'logoWrap' ? 'logo-wrap'
        : el.id === 'footerStack' ? 'footer-stack'
        : 'cta-btn';
    });
    phone.classList.remove('loaded', 'bg-reveal');
    goOverlay.classList.remove('run');
    impactBurst.querySelectorAll('.spark').forEach(function(s){ s.remove(); });
    buildLetters(wordPickle, 'Pickle', 0, 0);
    buildLetters(wordBallers, 'Ballers', 0, 0);
  }

  function runSequence(){
    clearTimers();
    resetVisualState();
    buildParticles();

    if (reduceMotion){
      phone.classList.add('loaded', 'bg-reveal');
      pickleball.style.display = 'none';
      paddle.style.display = 'none';
      trail.style.display = 'none';
      impactBurst.style.display = 'none';
      logoWrap.classList.add('reveal');
      footerStack.classList.add('reveal');
      buildLetters(wordPickle, 'Pickle', 0, 0);
      buildLetters(wordBallers, 'Ballers', 0, 0);
      wordPickle.querySelectorAll('.letter').forEach(function(l){ l.style.opacity = 1; l.style.transform = 'none'; });
      wordBallers.querySelectorAll('.letter').forEach(function(l){ l.style.opacity = 1; l.style.transform = 'none'; });
      timers.push(setTimeout(function(){ ctaBtn.classList.add('pulse'); }, 50));
      return;
    }

    pickleball.style.display = '';
    paddle.style.display = '';
    trail.style.display = '';
    impactBurst.style.display = '';

    buildLetters(wordPickle, 'Pickle', 1780, 38);
    buildLetters(wordBallers, 'Ballers', 1780 + 6 * 38 + 60, 38);

    timers.push(setTimeout(function(){ phone.classList.add('loaded'); }, 10));
    timers.push(setTimeout(function(){ pickleball.classList.add('show'); }, 160));

    timers.push(setTimeout(function(){ paddle.classList.add('swing-in'); }, 900));

    timers.push(setTimeout(function(){
      pickleball.classList.remove('show');
      pickleball.classList.add('hit');
      paddle.classList.remove('swing-in');
      paddle.classList.add('hit');
      buildSparks();
      impactBurst.classList.add('go');
      trail.classList.add('show');
    }, 1200));

    timers.push(setTimeout(function(){
      pickleball.classList.remove('hit');
      pickleball.classList.add('launch');
      paddle.classList.remove('hit');
      paddle.classList.add('swing-out');
    }, 1280));

    timers.push(setTimeout(function(){
      pickleball.classList.remove('launch');
      pickleball.classList.add('fade-out');
    }, 1620));

    timers.push(setTimeout(function(){ logoWrap.classList.add('reveal'); }, 1680));

    timers.push(setTimeout(function(){ phone.classList.add('bg-reveal'); }, 2480));

    timers.push(setTimeout(function(){ footerStack.classList.add('reveal'); }, 2980));

    timers.push(setTimeout(function(){ ctaBtn.classList.add('pulse'); }, 3680));
  }

  ctaBtn.addEventListener('click', function(e){
    var rect = ctaBtn.getBoundingClientRect();
    var r = document.createElement('span');
    var size = Math.max(rect.width, rect.height) * 1.6;
    r.className = 'ripple-tap';
    r.style.width = r.style.height = size + 'px';
    r.style.left = (e.clientX - rect.left - size / 2) + 'px';
    r.style.top = (e.clientY - rect.top - size / 2) + 'px';
    ctaBtn.appendChild(r);
    setTimeout(function(){ r.remove(); }, 600);

    var phoneRect = phone.getBoundingClientRect();
    var ox = ((e.clientX - phoneRect.left) / phoneRect.width * 100).toFixed(1) + '%';
    var oy = ((e.clientY - phoneRect.top) / phoneRect.height * 100).toFixed(1) + '%';
    goOverlay.style.setProperty('--ox', ox);
    goOverlay.style.setProperty('--oy', oy);
    goOverlay.classList.add('run');
  });

  replayBtn.addEventListener('click', function(e){
    e.stopPropagation();
    runSequence();
  });

  document.addEventListener('DOMContentLoaded', runSequence);
  if (document.readyState === 'complete' || document.readyState === 'interactive'){
    runSequence();
  }
})();
</script>

</body>
</html>
